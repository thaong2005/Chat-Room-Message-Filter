<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — DiscordChat</title>
    <link rel="stylesheet" href="auth.css" />
</head>
<body>

    <div class="auth-card">

        <!-- Header -->
        <div class="auth-header">
            <div class="auth-logo">💬</div>
            <h1>Welcome back!</h1>
            <p>We're so excited to see you again!</p>
        </div>

        <div class="divider"></div>

        <!-- Login Form -->
        <form class="auth-form" id="loginForm" novalidate>

            <!-- Username -->
            <div class="form-group" id="usernameGroup">
                <label for="username">Username <span class="required">*</span></label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Enter your username"
                    autocomplete="username"
                />
                <span class="error-msg" id="usernameError">Please enter a valid username.</span>
            </div>

            <!-- Password -->
            <div class="form-group" id="passwordGroup">
                <label for="password">Password <span class="required">*</span></label>
                <div class="input-wrapper">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter your password"
                        autocomplete="current-password"
                    />
                    <button type="button" class="toggle-password" aria-label="Show password" onclick="togglePassword('password', this)">
                        👁
                    </button>
                </div>
                <span class="error-msg" id="passwordError">Please enter your password.</span>
            </div>

            <!-- Forgot Password -->
            <a href="#" class="forgot-link">Forgot your password?</a>

            <div id="loginError" style="display:none; color: var(--danger); font-size: 13px; text-align: center;"></div>
            
            <!-- Submit -->
            <button type="submit" class="btn-submit" id="submitBtn">Log In</button>

            <!-- Footer -->
            <div class="auth-footer">
                Need an account? <a href="registerPage.html">Register</a>
            </div>

        </form>

    </div>

    <script>
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const isHidden = input.type === 'password';
            input.type = isHidden ? 'text' : 'password';
            btn.textContent = isHidden ? '🙈' : '👁';
            btn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
        }

        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
 
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const loginError = document.getElementById('loginError');
            const submitBtn = document.getElementById('submitBtn');
 
            // Clear previous errors
            loginError.style.display = 'none';
            loginError.textContent = '';
 
            // Validate fields
            let valid = true;
 
            if (!usernameInput.value.trim()) {
                document.getElementById('usernameGroup').classList.add('error');
                valid = false;
            } else {
                document.getElementById('usernameGroup').classList.remove('error');
            }
 
            if (!passwordInput.value.trim()) {
                document.getElementById('passwordGroup').classList.add('error');
                valid = false;
            } else {
                document.getElementById('passwordGroup').classList.remove('error');
            }
 
            if (!valid) return;
 
            // Send to backend
            submitBtn.textContent = 'Logging in...';
            submitBtn.disabled = true;
 
            try {
                const res = await fetch(
                    "http://localhost:8000/login?username=" + encodeURIComponent(usernameInput.value.trim()) +
                    "&password=" + encodeURIComponent(passwordInput.value),
                    { method: "POST" }
                );
 
                const data = await res.json();
 
                if (res.ok) {
                    // Save user info for use in lobby and chat
                    localStorage.setItem('user_id', data.user_id);
                    localStorage.setItem('username', data.username);
                    localStorage.setItem('role', data.role);
                    window.location.href = "index.html";
                } else {
                    // Show error from backend e.g. "Invalid username or password"
                    loginError.textContent = data.detail || "Login failed. Please try again.";
                    loginError.style.display = 'block';
                }
 
            } catch (err) {
                loginError.textContent = "Could not connect to server. Is the backend running?";
                loginError.style.display = 'block';
            } finally {
                submitBtn.textContent = 'Log In';
                submitBtn.disabled = false;
            }
        });
 
        // Clear error styling on input
        ['username', 'password'].forEach(id => {
            document.getElementById(id).addEventListener('input', function () {
                this.closest('.form-group').classList.remove('error');
            });
        });
    </script>

</body>
</html>
