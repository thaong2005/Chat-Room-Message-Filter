<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Bad Words</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="chatRoomStyle.css">
    <style>
        .compact-main {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            padding: 14px 16px;
            gap: 12px;
        }

        .compact-toolbar {
            display: grid;
            grid-template-columns: 1fr 220px;
            gap: 10px;
            align-items: center;
        }

        .summary-line {
            color: var(--text-muted);
            font-size: 14px;
        }

        .summary-line strong {
            color: var(--text-main);
            font-weight: 700;
        }

        .status-active {
            color: var(--online-green);
            font-weight: 700;
        }

        .search-input {
            width: 100%;
            height: 36px;
            border-radius: 8px;
            border: 1px solid rgba(88, 101, 242, 0.25);
            background: #1e1f22;
            color: var(--text-main);
            padding: 0 10px;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--discord-blurple);
            box-shadow: 0 0 0 2px rgba(88, 101, 242, 0.2);
        }

        .add-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            align-items: center;
            background: #232428;
            border: 1px solid rgba(88, 101, 242, 0.2);
            border-radius: 8px;
            padding: 8px;
        }

        .add-row input {
            height: 34px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: #1e1f22;
            color: var(--text-main);
            padding: 0 10px;
            outline: none;
        }

        .add-row input:focus {
            border-color: var(--discord-blurple);
        }

        .add-btn {
            height: 34px;
            min-width: 60px;
            border-radius: 6px;
            border: none;
            background: var(--discord-blurple);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            padding: 0 12px;
        }

        .add-btn:hover {
            background: var(--discord-blurple-hover);
        }

        .section-title {
            margin: 2px 0 0;
            font-size: 13px;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.4px;
        }

        .compact-list {
            background: #232428;
            border: 1px solid rgba(88, 101, 242, 0.15);
            border-radius: 8px;
            min-height: 180px;
            max-height: 340px;
            overflow-y: auto;
            padding: 4px;
        }

        .word-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 6px;
        }

        .word-row:hover {
            background: rgba(88, 101, 242, 0.08);
        }

        .word-chip {
            font-family: monospace;
            color: var(--discord-blurple);
            background: rgba(88, 101, 242, 0.12);
            padding: 3px 8px;
            border-radius: 6px;
            word-break: break-all;
        }

        .remove-btn {
            border: none;
            background: rgba(237, 66, 100, 0.14);
            color: #ff7d95;
            height: 28px;
            min-width: 28px;
            padding: 0 9px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        .remove-btn:hover {
            background: rgba(237, 66, 100, 0.24);
        }

        .empty-state {
            color: var(--text-muted);
            text-align: center;
            padding: 30px 12px;
            font-size: 14px;
        }

        @media (max-width: 640px) {
            .compact-toolbar {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="lobby-container">
        <!-- Header -->
        <div class="lobby-header">
            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 8px;">
                <button onclick="window.location.href='index.html'" class="back-btn">← Back</button>
                <h1 style="margin: 0; font-size: 24px;">⚙️ Modify Bad Words</h1>
            </div>
            <p>Add or remove banned words from the filter list</p>
        </div>

        <!-- Main Content -->
        <div class="compact-main">
            <div class="compact-toolbar">
                <div class="summary-line" id="summaryLine">Bad Words (<strong id="totalCount">0</strong>) • <span class="status-active" id="statusText">Ready</span></div>
                <input type="text" id="searchBadWord" class="search-input" placeholder="Search bad words..." autocomplete="off">
            </div>

            <form id="addBadWordForm" class="add-row">
                <input 
                    type="text" 
                    id="newBadWord" 
                    placeholder="Enter a bad word..." 
                    required
                    autocomplete="off"
                >
                <button type="submit" class="add-btn" title="Add word">Add</button>
            </form>

            <div id="statusMessage" class="message" style="display: none; margin: 0;"></div>

            <h3 class="section-title">Current Bad Words (<span id="badWordsCount">0</span>)</h3>
            <div id="badWordsList" class="compact-list">
                <div class="empty-state">Loading bad words...</div>
            </div>
        </div>
    </div>

    <script src="badwords.js"></script>
</body>
</html>
