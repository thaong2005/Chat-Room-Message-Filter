<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account — DiscordChat</title>
    <link rel="stylesheet" href="auth.css" />
</head>
<body>

    <div class="auth-card">

        <!-- Header -->
        <div class="auth-header">
            <div class="auth-logo">💬</div>
            <h1>Create an account</h1>
        </div>

        <!-- Register Form -->
        <form class="auth-form" id="registerForm" novalidate>
            <!-- Username -->
            <div class="form-group" id="usernameGroup">
                <label for="username">Username <span class="required">*</span></label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Choose a unique username"
                    autocomplete="username"
                />
                <span class="error-msg" id="usernameError">Username must be at least 3 characters.</span>
            </div>

            <!-- Password -->
            <div class="form-group" id="passwordGroup">
                <label for="password">Password <span class="required">*</span></label>
                <div class="input-wrapper">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Create a strong password"
                        autocomplete="new-password"
                    />
                    <button type="button" class="toggle-password" aria-label="Toggle password visibility" onclick="togglePassword('password', this)">
                        👁
                    </button>
                </div>
                <span class="error-msg" id="passwordError">Password must be at least 8 characters.</span>
            </div>


            <!-- Submit -->
            <button type="submit" class="btn-submit">Continue</button>

            <!-- Footer -->
            <div class="auth-footer">
                Already have an account? <a href="login.html">Log In</a>
            </div>

        </form>

    </div>

    <script>
        /* --- Toggle password visibility --- */
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const isHidden = input.type === 'password';
            input.type = isHidden ? 'text' : 'password';
            btn.textContent = isHidden ? '🙈' : '👁';
        }

        /* --- Form Validation --- */
        function setError(groupId, show) {
            document.getElementById(groupId).classList.toggle('error', show);
        }

        document.getElementById('registerForm').addEventListener('submit', function (e) {
            e.preventDefault();
            let valid = true;

            const username = document.getElementById('username').value.trim();
            setError('usernameGroup', username.length < 3);
            if (username.length < 3) valid = false;

            if (valid) {
                // TODO: submit registration data to your backend
                console.log('Register submitted', { username });
            }
        });

        /* Clear errors on input */
        ['username'].forEach(id => {
            const groupMap = {
                username: 'usernameGroup'
            };
            document.getElementById(id).addEventListener('input', function () {
                setError(groupMap[id], false);
            });
        });

    </script>

</body>
</html>
