<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Lobby | Explore Rooms</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="lobby-container">
        <!-- Header -->
        <div class="lobby-header">
            <h1>Explore Rooms</h1>
            <p>Find a community or join a friend's conversation.</p>
            
            <div class="search-box">
                <i class="fas fa-search" style="color: var(--text-muted);"></i>
                <input type="text" id="search-input" placeholder="Search for a chatroom...">
            </div>
        </div>

        <!-- Room List -->
        <div class="rooms-list" id="rooms-list">
            <!-- Rooms will be loaded here by JavaScript -->
        </div>

        <!-- Footer -->
        <div class="lobby-footer">
            <button class="btn-create">Create Your Own Room</button>
        </div>
    </div>

    <script src="lobby.js"></script>
</body>
</html>
