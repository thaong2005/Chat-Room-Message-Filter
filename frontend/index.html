<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Lobby | Explore Rooms</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .settings-menu-container {
            position: relative;
        }

        .settings-menu-btn {
            background: none;
            border: none;
            padding: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin: 8px;
        }

        .settings-menu-btn img {
            width: 40px;
            height: 40px;
            opacity: 0.7;
            transition: all 0.3s;
        }

        .settings-menu-btn:hover img {
            opacity: 1;
            transform: scale(1.1);
        }

        .settings-dropdown {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            background: #232428;
            border: 1px solid rgba(88, 101, 242, 0.3);
            border-radius: 8px;
            min-width: 200px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            margin-top: 8px;
            animation: slideDown 0.2s ease-out;
        }

        .settings-dropdown.active {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .settings-dropdown a,
        .settings-dropdown button {
            display: block;
            width: 100%;
            padding: 12px 16px;
            text-align: left;
            background: none;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            text-decoration: none;
            font-family: 'gg sans', 'Noto Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        .settings-dropdown a:hover,
        .settings-dropdown button:hover {
            background: rgba(88, 101, 242, 0.2);
            color: var(--discord-blurple);
        }

        .settings-dropdown a:first-child,
        .settings-dropdown button:first-child {
            border-radius: 8px 8px 0 0;
        }

        .settings-dropdown a:last-child,
        .settings-dropdown button:last-child {
            border-radius: 0 0 8px 8px;
        }

        .settings-dropdown-divider {
            height: 1px;
            background: rgba(88, 101, 242, 0.2);
            margin: 4px 0;
        }

        .logout-btn {
            background: rgba(237, 66, 100, 0.08);
            border: 1px solid rgba(237, 66, 100, 0.5);
            width: 34px;
            height: 34px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin: 8px;
            border-radius: 8px;
            color: #ed4264;
            font-size: 15px;
            transition: all 0.3s;
            font-family: 'gg sans', 'Noto Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        .logout-btn:hover {
            background: rgba(237, 66, 100, 0.1);
            border-color: #ed4264;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="lobby-container">
        <!-- Header -->
        <div class="lobby-header" style="display: flex; justify-content: space-between; align-items: flex-start;">
            <div>
                <h1>Explore Rooms</h1>
                <p>Find a community or join a friend's conversation.</p>
                
                <div class="search-box">
                    <i class="fas fa-search" style="color: var(--text-muted);"></i>
                    <input type="text" id="search-input" placeholder="Search for a chatroom...">
                </div>
            </div>
            <!-- Settings Menu & Logout -->
            <div style="display: flex; align-items: center; gap: 0;">
                <button class="logout-btn" id="logoutBtn" title="Logout">
                    <i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i>
                </button>
                <div class="settings-menu-container">
                    <button class="settings-menu-btn" id="settingsBtn" title="Menu">
                        <img src="https://cdn-icons-png.flaticon.com/512/563/563541.png" alt="Menu">
                    </button>
                    <div class="settings-dropdown" id="settingsDropdown">
                        <a href="/badwords.html">⚙️ Manage Bad Words</a>
                        <div class="settings-dropdown-divider"></div>
                        <a href="/user-list.html">👥 View User List</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Room List -->
        <div class="rooms-list" id="rooms-list">
            <!-- Rooms will be loaded here by JavaScript -->
        </div>

        <!-- Footer -->
        <div class="lobby-footer">
            <button class="btn-create">Create Your Own Room</button>
        </div>
    </div>

    <script src="lobby.js"></script>
    <script>
        // Logout button
        const logoutBtn = document.getElementById('logoutBtn');
        logoutBtn.addEventListener('click', () => {
            window.location.href = '/loginPage.html';
        });

        // Settings menu toggle
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsDropdown = document.getElementById('settingsDropdown');

        settingsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            settingsDropdown.classList.toggle('active');
        });

        // Close dropdown when clicking elsewhere
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.settings-menu-container')) {
                settingsDropdown.classList.remove('active');
            }
        });

        // Close dropdown when clicking a link
        settingsDropdown.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                settingsDropdown.classList.remove('active');
            });
        });

        // const role = localStorage.getItem('role');
        // if (role !== 'admin') {
        //     document.getElementById('settingsBtn').style.display = 'none';
        // }
    </script>
</body>
</html>
